          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build macOS arm64 app
        run: |
          cd apps/desktop
          pnpm run dist:mac:dir:arm64

      - name: Upload arm64 app
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-app
          path: apps/desktop/release/mac-arm64/
          retention-days: 7

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
