name: Build & Release

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Clone OpenClaw vendor
        shell: bash
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git checkout "$HASH"
          git checkout -B main

      - name: Cache vendor node_modules
        id: cache-vendor-nm
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/node_modules
          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        shell: bash
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build Windows app
        run: |
          cd apps/desktop
          pnpm run dist:win
        env:
          # Code signing will be handled by SignPath
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload unsigned installer for signing
        uses: actions/upload-artifact@v6
        with:
          name: unsigned-windows-installer
          path: apps/desktop/release/*.exe
          retention-days: 7

      # TODO: Once SignPath is configured, add signing step here
      # - name: Submit to SignPath for signing
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      #     project-slug: 'rivonclaw'
      #     signing-policy-slug: 'release-signing'
      #     artifact-configuration-slug: 'windows-installer'
      #     input-artifact-path: 'apps/desktop/release/RivonClaw-Setup.exe'
      #     output-artifact-path: 'apps/desktop/release/RivonClaw-Setup-Signed.exe'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-installers
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          retention-days: 30

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
