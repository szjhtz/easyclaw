      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build macOS x64 app
        run: |
          cd apps/desktop
          pnpm run dist:mac:dir:x64

      - name: Upload x64 app
        uses: actions/upload-artifact@v6
        with:
          name: macos-x64-app
          path: apps/desktop/release/mac-x64/
          retention-days: 7

  package-macos:
    runs-on: macos-latest
    needs: [build-macos-arm64, build-macos-x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # pnpm needs vendor/openclaw to exist (lockfile has file:vendor/openclaw)
      - name: Clone OpenClaw vendor
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone --depth 1 https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git fetch --depth 1 origin "$HASH"
          git checkout "$HASH"
          git checkout -B main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download arm64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-app
          path: apps/desktop/release/mac-arm64/

      - name: Download x64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-x64-app
          path: apps/desktop/release/mac-x64/

      - name: Merge universal app
        run: |
          cd apps/desktop
          pnpm run dist:mac:universal:merge

      # Import code signing certificate (when secrets are configured)
      - name: Import Code Signing Certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Package DMG + ZIP
        run: |
          cd apps/desktop
          pnpm run dist:mac:universal:package
        env:
          # Notarization credentials (optional, only if configured)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-installers
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/latest-mac.yml
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Checkout merchant extensions
        uses: actions/checkout@v5
        with:
          repository: gaoyangz77/rivonclaw-merchant-extensions
          token: ${{ secrets.PRIVATE_EXTENSIONS_PAT }}
          path: extensions-merchant

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Clone OpenClaw vendor
        run: |
          HASH=$(tr -d '[:space:]' < .openclaw-version)
          git clone https://github.com/openclaw/openclaw.git vendor/openclaw
          cd vendor/openclaw
          git checkout "$HASH"
          git checkout -B main

      - name: Cache vendor node_modules
        id: cache-vendor-nm
        uses: actions/cache@v4
        with:
