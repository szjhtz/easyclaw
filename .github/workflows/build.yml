          key: vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor/openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            vendor-nm-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-

      - name: Cache vendor dist
        id: cache-vendor-dist
        uses: actions/cache@v4
        with:
          path: vendor/openclaw/dist
          key: vendor-dist-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}

      # Post-prune cache: contains the production-ready dist/, pruned
      # node_modules, modified .gitignore, and stripped dist-runtime/ after
      # prune-vendor-deps.cjs has run. When this hits, prune sees .pruned
      # marker and skips, saving ~2-5 min per build.
      - name: Cache vendor prod
        id: cache-vendor-prod
        uses: actions/cache@v4
        with:
          path: |
            vendor/openclaw/dist
            vendor/openclaw/node_modules
            vendor/openclaw/.gitignore
            vendor/openclaw/dist-runtime
          key: vendor-prod-${{ runner.os }}-${{ hashFiles('.openclaw-version') }}-${{ hashFiles('vendor-patches/openclaw/*.patch') }}-${{ hashFiles('apps/desktop/scripts/prune-vendor-deps.cjs', 'apps/desktop/scripts/copy-vendor-deps.cjs') }}

      - name: Setup OpenClaw vendor
        if: steps.cache-vendor-prod.outputs.cache-hit != 'true'
        run: ./scripts/setup-vendor.sh --skip-clone
        env:
          SKIP_VENDOR_INSTALL: ${{ steps.cache-vendor-nm.outputs.cache-hit }}
          SKIP_VENDOR_BUILD: ${{ steps.cache-vendor-dist.outputs.cache-hit }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Build Linux app
        run: |
          cd apps/desktop
          pnpm run dist:linux

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-installers
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/*.deb
            apps/desktop/release/latest-linux.yml
          retention-days: 30

  create-release:
    needs: [build-windows, package-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./apps/desktop/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v6
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v6
        with:
          name: macos-installers
          path: artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v6
        with:
          name: linux-installers
          path: artifacts/linux

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Delete existing draft release for this tag (if re-running workflow)
          if gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null | grep -q true; then
            echo "Deleting existing draft release $TAG..."
            gh release delete "$TAG" --yes
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          # Create the draft release with release notes and all artifacts
          gh release create "$TAG" \
            --title "RivonClaw $TAG" \
            --notes-file .github/RELEASE_BODY.md \
            --draft \
            artifacts/windows/* \
            artifacts/macos/* \
            artifacts/linux/*

          echo "Draft release $TAG created with all artifacts."
