appId: com.easyclaw.desktop
productName: RivonClaw

directories:
  output: release

files:
  - dist/**
  - build/trayIcon.png
  - build/trayIcon@2x.png
  - changelog.json
  - node_modules/**
  - "!node_modules/**/test_extension.node"
  - package.json

extraMetadata:
  main: dist/main.cjs

asar: true
icon: build/icon

# Files copied outside asar into Contents/Resources/
extraResources:
  # OpenClaw vendor runtime — must be outside asar (runs as a separate Node.js process)
  - from: "../../vendor/openclaw"
    to: "vendor/openclaw"
    filter:
      - "openclaw.mjs"
      - "package.json"
      - "dist/**"
      - "docs/**"
      - "extensions/**"
      - "!extensions/**/node_modules/**"
      # Exclude dist-runtime/ — contains symlinked node_modules (~7K files)
      # that inflate installer and cause runtime errors (stubs point to
      # dist/extensions/ chunks that don't exist after bundling).
      - "!dist-runtime/**"
      - "packages/**"
      - "!packages/**/node_modules/**"
      # Exclude CLAUDE.md symlinks (→ AGENTS.md) — dev-only Claude Code
      # instructions that break Windows 7zip packaging (NTFS can't handle
      # the symlinks created by git clone without elevated permissions).
      - "!**/CLAUDE.md"
      - "!**/AGENTS.md"
      # Re-include workspace templates that the runtime reads at dispatch
      # time (e.g. AGENTS.md used as template content).
      - "docs/reference/templates/**"
      - "docs/zh-CN/reference/templates/**"
      # Re-exclude CLAUDE.md inside templates — these are symlinks (→ AGENTS.md)
      # that break Windows packaging (NTFS treats them as invalid directories).
      - "!docs/reference/templates/CLAUDE.md"
      - "!docs/zh-CN/reference/templates/CLAUDE.md"
  # Pre-bundled vendor extensions (CJS format, tree-shaken by bundle-vendor-deps.cjs).
  # Written directly to .prebundled-extensions/ by Phase 0.5b — overlays vendor
  # extensions with bundled .js + updated package.json in release builds.
  # In pack-only builds (no bundle step), this dir doesn't exist and is skipped.
  - from: ".prebundled-extensions"
    to: "vendor/openclaw/extensions"
  # RivonClaw extensions — auto-discovered by OpenClaw at runtime
  - from: "../../extensions"
    to: "extensions"
    filter:
      - "**"
      - "!**/node_modules/**"
  # Private merchant extensions (may not exist in open-source builds)
  - from: "../../extensions-merchant"
    to: "extensions-merchant"
    filter:
      - "**"
      - "!**/node_modules/**"
      - "!**/.turbo/**"
      - "!**/src/**"
      - "!**/test/**"
      - "!**/tsconfig*.json"
      - "!**/tsdown.config.*"
      - "!**/vitest.config.*"
      - "!**/*.map"
      - "!*.md"
      - "!**/README.md"
  # Volcengine STT CLI bridge script (not natively supported in OpenClaw).
  # Copied to resources root so main.ts can resolve it via process.resourcesPath.
  - from: "../../packages/gateway/dist"
    to: "."
    filter:
      - "volcengine-stt-cli.mjs"
  # Panel UI static files
  - from: "../panel/dist"
    to: "panel-dist"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  extendInfo:
    LSUIElement: true
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  identity: null
  notarize: false
  # Vendor node_modules may contain Mach-O binaries (sharp, koffi, etc.)
  # that are identical in both x64/arm64 builds. Tell the universal
  # merge to skip lipo for these files. Two vendor patterns are needed:
  # 1) .pnpm/** — minimatch doesn't match dotfiles with **, so .pnpm
  #    must be named explicitly
  # 2) **     — covers non-dotfile paths (@img/sharp-*, etc.)
  x64ArchFiles: "Contents/Resources/{vendor/openclaw/node_modules/.pnpm/**,vendor/openclaw/node_modules/**,app.asar.unpacked/node_modules/better-sqlite3/**}"
dmg:
  background: build/dmg-background.png
  iconSize: 80
  window:
    width: 590
    height: 380
  contents:
    - x: 155
      y: 200
    - x: 435
      y: 200
      type: link
      path: /Applications

publish:
  - provider: generic
    url: https://www.rivonclaw.com/releases/

afterPack: scripts/copy-vendor-deps.cjs
afterSign: scripts/notarize.cjs
